      "Title": "Variance Component Analysis",
      "Authors@R": "c(person(\"Andre\", \"Schuetzenmeister\", role = c(\"aut\", \"cre\"), email = \"andre.schuetzenmeister@roche.com\", comment = c(ORCID = \"0000-0002-2964-5502\")), person(\"Florian\", \"Dufey\", role = \"aut\", email = \"florian.dufey@roche.com\", comment = c(ORCID = \"0000-0001-6467-8556\")))",
      "Depends": [
